{{define "admin_post_form"}}
<!doctype html>
<html lang="zh-CN">
{{template "admin_head" .}}
<body class="admin">
    {{template "admin_nav" .}}
    <main class="admin-main">
        <h2>{{if .Post}}编辑文章{{else}}新建文章{{end}}</h2>
        {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
        <form class="admin-form" method="post">
            <label>
                <span>标题</span>
                <input type="text" name="title" value="{{if .Post}}{{.Post.Title}}{{end}}" placeholder="请输入文章标题">
            </label>
            <label>
                <span>Slug（可选）</span>
                <input type="text" name="slug" value="{{if .Post}}{{.Post.Slug}}{{end}}" placeholder="用于链接的英文别名">
            </label>
            <label>
                <span>摘要</span>
                <textarea name="summary" rows="3" placeholder="文章摘要">{{if .Post}}{{.Post.Summary}}{{end}}</textarea>
            </label>
            <label>
                <span>封面图 URL</span>
                <input type="text" name="cover_url" value="{{if .Post}}{{.Post.CoverURL}}{{end}}" placeholder="例如 /static/img/cover-1.svg">
            </label>
            <label>
                <span>发布时间（YYYY-MM-DD HH:MM）</span>
                <input type="text" name="published_at" value="{{if .Post}}{{formatDate .Post.PublishedAt}}{{end}}" placeholder="例如 2026-01-08 16:20">
            </label>
            <label class="checkbox">
                <input type="checkbox" name="is_public" {{if .Post}}{{if .Post.IsPublic}}checked{{end}}{{else}}checked{{end}}>
                <span>公开发布</span>
            </label>
            <label>
                <span>正文（支持 Markdown）</span>
                <textarea name="content" rows="12" placeholder="请输入正文内容">{{if .Post}}{{.Post.Content}}{{end}}</textarea>
            </label>
            <div class="form-actions">
                <button type="submit">保存</button>
                <a class="btn ghost" href="/admin/posts">返回列表</a>
            </div>
        </form>
    </main>
</body>
</html>
{{end}}
