{{define "archive"}}
<!doctype html>
<html lang="zh-CN">
{{template "head" .}}
<body class="site">
    {{template "site_nav" .}}
    <header class="sub-hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>归档</h1>
            <p>把每一段记录收进时间的抽屉。</p>
        </div>
    </header>
    <main class="layout">
        {{template "sidebar" .}}
        <section class="content">
            <div class="glass-card">
                {{range .Posts}}
                <div class="archive-item">
                    <span class="archive-date">{{formatDate .PublishedAt}}</span>
                    <a class="archive-title" href="/post/{{.Slug}}">{{.Title}}</a>
                </div>
                {{end}}
            </div>
        </section>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
