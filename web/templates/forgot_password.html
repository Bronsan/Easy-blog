{{define "forgot_password"}}
<!doctype html>
<html lang="zh-CN">
{{template "head" .}}
<body class="site">
    {{template "site_nav" .}}
    <main class="auth-main">
        <section class="auth-card">
            <h1>找回密码</h1>
            <p class="muted">输入用户名后，系统会生成重置链接并发送到通知中心。</p>
            {{if .Flash}}<div class="alert">{{.Flash}}</div>{{end}}
            <form class="auth-form" method="post" action="/forgot-password">
                <label>
                    <span>用户名</span>
                    <input type="text" name="username" required>
                </label>
                <button type="submit">生成重置链接</button>
            </form>
            <p class="auth-switch"><a href="/login">返回登录</a></p>
        </section>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
