{{define "member_page_form"}}
<!doctype html>
<html lang="zh-CN">
{{template "admin_head" .}}
<body class="admin">
    {{template "member_nav" .}}
    <main class="admin-main">
        <h2>{{if .Post}}编辑我的页面{{else}}新建我的页面{{end}}</h2>
        {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
        <form class="admin-form" method="post">
            <label><span>标题</span><input type="text" name="title" value="{{if .Post}}{{.Post.Title}}{{end}}" required></label>
            <label><span>Slug（可选）</span><input type="text" name="slug" value="{{if .Post}}{{.Post.Slug}}{{end}}"></label>
            <label><span>摘要</span><textarea name="summary" rows="3">{{if .Post}}{{.Post.Summary}}{{end}}</textarea></label>
            <label><span>发布时间（YYYY-MM-DD HH:MM）</span><input type="text" name="published_at" value="{{if .Post}}{{formatDate .Post.PublishedAt}}{{end}}"></label>
            <label class="checkbox"><input type="checkbox" name="is_public" {{if .Post}}{{if .Post.IsPublic}}checked{{end}}{{else}}checked{{end}}><span>公开显示</span></label>
            <label><span>内容（支持 Markdown）</span><textarea name="content" rows="12">{{if .Post}}{{.Post.Content}}{{end}}</textarea></label>
            <div class="form-actions">
                <button type="submit">保存</button>
                <a class="btn ghost" href="/member/pages">返回列表</a>
            </div>
        </form>
    </main>
</body>
</html>
{{end}}
