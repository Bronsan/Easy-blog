{{define "register"}}
<!doctype html>
<html lang="zh-CN">
{{template "head" .}}
<body class="site">
    {{template "site_nav" .}}
    <main class="auth-main">
        <section class="auth-card">
            <h1>用户注册</h1>
            <p class="muted">注册后默认角色为访问者，可登录前台并进入个人后台。</p>
            {{if .Flash}}<div class="alert">{{.Flash}}</div>{{end}}
            <form class="auth-form" method="post" action="/register">
                <label>
                    <span>用户名</span>
                    <input type="text" name="username" value="{{.AuthFormUsername}}" placeholder="3-32 位字母/数字/下划线" autocomplete="username" required>
                </label>
                <label>
                    <span>显示名</span>
                    <input type="text" name="display_name" value="{{.AuthFormDisplayName}}" placeholder="用于前台显示（可留空）">
                </label>
                <label>
                    <span>邮箱（可选）</span>
                    <input type="email" name="email" placeholder="用于找回密码和验证">
                </label>
                <label>
                    <span>密码</span>
                    <input type="password" name="password" placeholder="至少 6 位" autocomplete="new-password" required>
                </label>
                <label>
                    <span>确认密码</span>
                    <input type="password" name="confirm_password" placeholder="再次输入密码" autocomplete="new-password" required>
                </label>
                <button type="submit">注册并登录</button>
            </form>
            <p class="auth-switch">已有账号？<a href="/login">去登录</a></p>
        </section>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
