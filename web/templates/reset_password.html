{{define "reset_password"}}
<!doctype html>
<html lang="zh-CN">
{{template "head" .}}
<body class="site">
    {{template "site_nav" .}}
    <main class="auth-main">
        <section class="auth-card">
            <h1>重置密码</h1>
            <p class="muted">请输入新密码并确认。</p>
            {{if .Flash}}<div class="alert">{{.Flash}}</div>{{end}}
            <form class="auth-form" method="post" action="/reset-password">
                <input type="hidden" name="token" value="{{.AuthNext}}">
                <label>
                    <span>新密码</span>
                    <input type="password" name="new_password" minlength="6" required>
                </label>
                <label>
                    <span>确认新密码</span>
                    <input type="password" name="confirm_password" minlength="6" required>
                </label>
                <button type="submit">确认重置</button>
            </form>
            <p class="auth-switch"><a href="/login">返回登录</a></p>
        </section>
    </main>
    {{template "footer" .}}
</body>
</html>
{{end}}
